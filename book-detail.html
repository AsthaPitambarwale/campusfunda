    <style>
      .book-layout {
        display: flex;
        gap: 40px;
        align-items: flex-start;
        margin-bottom: 60px;
      }

      .book-cover-col {
        flex: 0 0 280px;
      }

      .book-cover-img {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        display: block;
      }

      .pub-badge-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
      }

      .pub-logo-sm {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        padding: 4px;
        object-fit: contain;
      }

      .pub-name {
        font-size: 13px;
        color: var(--text-muted);
      }

      .book-info-col {
        flex: 1;
      }

      .book-category-tag {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--accent);
        background: rgba(10, 180, 181, 0.1);
        border: 1px solid rgba(10, 180, 181, 0.22);
        padding: 3px 12px;
        border-radius: 20px;
        display: inline-block;
        margin-bottom: 14px;
      }

      .book-title {
        font-size: 32px;
        font-weight: 800;
        color: var(--text-primary);
        line-height: 1.25;
        margin-bottom: 10px;
      }

      .book-author {
        font-size: 16px;
        color: var(--accent);
        font-weight: 600;
        margin-bottom: 16px;
      }

      .book-meta-row {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        margin-bottom: 22px;
        padding-bottom: 22px;
        border-bottom: 1px solid var(--border);
      }

      .meta-chip {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 13px;
        color: var(--text-muted);
      }

      .meta-chip .mi {
        font-size: 16px;
      }

      .star-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 22px;
      }

      .stars {
        color: #f5a623;
        font-size: 18px;
        letter-spacing: 1px;
      }

      .star-count {
        font-size: 14px;
        color: var(--text-muted);
      }

      .book-desc {
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.8;
        margin-bottom: 26px;
      }

      .price-block {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 28px;
      }

      .price-main {
        font-size: 36px;
        font-weight: 900;
        background: var(--accent-grad);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .price-original {
        font-size: 20px;
        color: var(--text-muted);
        text-decoration: line-through;
      }

      .discount-badge {
        background: rgba(76, 175, 80, 0.15);
        border: 1px solid rgba(76, 175, 80, 0.3);
        color: #4caf50;
        font-size: 13px;
        font-weight: 700;
        padding: 4px 12px;
        border-radius: 20px;
      }

      .cta-row {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }

      .btn-add-cart {
        display: flex;
        align-items: center;
        gap: 9px;
        background: var(--bg-card);
        border: 2px solid var(--accent);
        color: var(--accent);
        padding: 14px 28px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-add-cart:hover {
        background: rgba(10, 180, 181, 0.1);
      }

      .btn-add-cart.added {
        background: rgba(10, 180, 181, 0.15);
        border-color: var(--accent);
      }

      .btn-buy-now {
        display: flex;
        align-items: center;
        gap: 9px;
        background: var(--accent-grad);
        color: #fff;
        padding: 14px 28px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        border: none;
        transition:
          opacity 0.2s,
          transform 0.2s;
      }

      .btn-buy-now:hover {
        opacity: 0.88;
        transform: scale(1.02);
      }

      .cart-toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 999;
        background: var(--bg-card);
        border: 1px solid var(--accent);
        border-left: 4px solid var(--accent);
        border-radius: 10px;
        padding: 16px 22px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        transform: translateX(120%);
        transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        min-width: 280px;
      }

      .cart-toast.show {
        transform: translateX(0);
      }

      .ct-icon {
        font-size: 22px;
      }

      .ct-msg {
        flex: 1;
      }

      .ct-msg strong {
        display: block;
        font-size: 14px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 3px;
      }

      .ct-msg span {
        font-size: 12px;
        color: var(--text-muted);
      }

      .ct-link {
        font-size: 12px;
        font-weight: 700;
        color: var(--accent);
        white-space: nowrap;
      }

      .ct-link:hover {
        text-decoration: underline;
      }

      .book-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 26px;
      }

      .book-tab {
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-muted);
        cursor: pointer;
        border-bottom: 3px solid transparent;
        margin-bottom: -1px;
        transition: all 0.2s;
      }

      .book-tab.active {
        color: var(--text-primary);
        border-bottom-color: var(--accent);
      }

      .tab-panel {
        display: none;
      }

      .tab-panel.active {
        display: block;
      }

      .toc-list {
        list-style: none;
      }

      .toc-item {
        display: flex;
        gap: 14px;
        align-items: center;
        padding: 13px 0;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
        color: var(--text-secondary);
        cursor: pointer;
        transition: color 0.2s;
      }

      .toc-item:last-child {
        border-bottom: none;
      }

      .toc-item:hover {
        color: var(--accent);
      }

      .toc-num {
        flex: 0 0 28px;
        height: 28px;
        border-radius: 6px;
        background: rgba(10, 180, 181, 0.1);
        border: 1px solid rgba(10, 180, 181, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: var(--accent);
      }

      .review-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 14px;
      }

      .review-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }

      .review-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--accent-grad);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .review-name {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .review-date {
        font-size: 12px;
        color: var(--text-muted);
      }

      .review-stars {
        color: #f5a623;
        font-size: 14px;
      }

      .review-text {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.7;
      }

      .related-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }

      .spec-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      .spec-table tr {
        border-bottom: 1px solid var(--border);
      }

      .spec-table tr:last-child {
        border-bottom: none;
      }

      .spec-table td {
        padding: 12px 16px;
      }

      .spec-table td:first-child {
        color: var(--text-muted);
        font-weight: 600;
        width: 200px;
      }

      .spec-table td:last-child {
        color: var(--text-primary);
      }

      @media (max-width: 900px) {
        .book-layout {
          flex-direction: column;
        }

        .book-cover-col {
          flex: none;
          max-width: 260px;
        }

        .related-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>

      // ===== CART FUNCTIONS =====
      function getCart() {
        return JSON.parse(localStorage.getItem("cf_cart") || "[]");
      }
      function saveCart(c) {
        localStorage.setItem("cf_cart", JSON.stringify(c));
      }

      function addToCart(book) {
        if (!requireLogin()) return;

        const cart = getCart();
        const exists = cart.find((i) => i.id === book.id);
        if (!exists) {
          cart.push({
            id: book.id,
            title: book.title,
            author: book.author,
            price: book.price,
            img: book.img,
            type: book.type,
          });
          saveCart(cart);
        }
        updateCartBadge();
        showToast(book.title, cart.length, exists);
        updateAddBtn(exists);
      }

      function updateCartBadge() {
        const n = getCart().length;
        document.getElementById("cartCount").textContent = n;
      }

      function showToast(title, count, alreadyIn) {
        const toast = document.getElementById("cartToast");
        document.getElementById("toastTitle").textContent = alreadyIn
          ? "Already in Cart"
          : "Added to Cart!";
        document.getElementById("toastCount").textContent =
          count + " item" + (count !== 1 ? "s" : "") + " in your cart";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
      }

      function updateAddBtn(alreadyIn) {
        const btn = document.getElementById("addCartBtn");
        if (!btn) return;
        if (alreadyIn) {
          btn.innerHTML = "&#10003; In Cart";
          btn.classList.add("added");
        }
      }

      function buyNow(book) {
        if (!requireLogin()) return;

        addToCart(book);

        setTimeout(() => {
          window.location.href = "cart.html";
        }, 400);
      }

      function renderStars(r) {
        const full = Math.floor(r),
          half = r % 1 >= 0.5;
        let s = "";
        for (let i = 0; i < full; i++) s += "&#9733;";
        if (half) s += "&#9734;";
        return s;
      }

      function renderBook(book) {
        book.reviews_list = book.reviews_list || [];
        book.toc = book.toc || [];
        const cart = getCart();
        const inCart = cart.find((i) => i.id === book.id);
        const discount = Math.round(
          (1 - book.price / book.originalPrice) * 100,
        );

        document.title = book.title + " – Campus Funda";
        document.getElementById("breadcrumbTitle").textContent = book.title;

        const tocHtml = (book.toc || [])
          .map(
            (t, i) => `
    <li class="toc-item">
      <span class="toc-num">${i + 1}</span>
      <span>${t}</span>
    </li>
  `,
          )
          .join("");

        const reviewsHtml = (book.reviews_list || [])
          .map(
            (r) => `
    <div class="review-card">
      <div class="review-header">
        <div class="review-avatar">${r.initial}</div>
        <div>
          <div class="review-name">${r.name}</div>
          <div class="review-stars">${renderStars(r.rating)}</div>
        </div>
        <div style="margin-left:auto;font-size:12px;color:var(--text-muted)">
          ${r.date}
        </div>
      </div>
      <div class="review-text">${r.text}</div>
    </div>
  `,
          )
          .join("");

        const relatedKeys = Object.keys(BOOKS)
          .filter((k) => k !== book.id)
          .slice(0, 4);
        const relatedHtml = relatedKeys
          .map((k) => {
            const b = BOOKS[k];
            return `<a href="book-detail.html?id=${b.id}" class="card">
          <img class="card-img" src="${b.img}" alt="${b.title}" />
          <div class="card-body">
            <div class="card-title">${b.title}</div>
            <div class="card-sub">${b.author}</div>
          </div>
          <div class="card-footer">
            <span class="price-old">&#8377;${b.originalPrice}</span>
            <span class="price-new">&#8377;${b.price}</span>
          </div>
        </a>`;
          })
          .join("");

        document.getElementById("bookContent").innerHTML = `
        <div class="book-layout">
          <div class="book-cover-col">
            <img class="book-cover-img" src="${book.img}" alt="${book.title}" />
            <div class="pub-badge-row">
              <img class="pub-logo-sm" src="${book.pubLogo}" alt="${book.publisher}" />
              <span class="pub-name">${book.publisher}</span>
            </div>
          </div>

          <div class="book-info-col">
            <span class="book-category-tag">${book.category}</span>
            <h1 class="book-title">${book.title}</h1>
            <div class="book-author">by ${book.author}</div>

            <div class="book-meta-row">
              <span class="meta-chip"><span class="mi">&#127979;</span>${book.university}</span>
              <span class="meta-chip"><span class="mi">&#128218;</span>${book.subject}</span>
              ${book.pages > 0 ? `<span class="meta-chip"><span class="mi">&#128196;</span>${book.pages} pages</span>` : ""}
              <span class="meta-chip"><span class="mi">&#127760;</span>${book.language}</span>
            </div>

            <div class="star-row">
              <span class="stars">${renderStars(book.rating)}</span>
              <span class="star-count">${book.rating} (${book.reviews} reviews)</span>
            </div>

            <p class="book-desc">${book.description}</p>

            <div class="price-block">
              <span class="price-main">${book.price === 0 ? "FREE" : "&#8377;" + book.price}</span>
              ${book.originalPrice > book.price ? `<span class="price-original">&#8377;${book.originalPrice}</span><span class="discount-badge">${discount}% OFF</span>` : ""}
            </div>

            <div class="cta-row">
              <button class="btn-add-cart ${inCart ? "added" : ""}" id="addCartBtn" onclick="addToCart(BOOKS['${book.id}'])">
                &#128722; ${inCart ? "&#10003; In Cart" : "Add to Cart"}
              </button>
              <button class="btn-buy-now" onclick="buyNow(BOOKS['${book.id}'])">
                &#9889; Buy Now
              </button>
            </div>

            <div style="font-size:12px;color:var(--text-muted);display:flex;gap:20px;flex-wrap:wrap">
              <span>&#10003; Instant digital access</span>
              <span>&#10003; Read on any device</span>
              <span>&#10003; ${book.edition}</span>
            </div>
          </div>
        </div>

        <!-- TABS -->
        <div class="book-tabs">
          <div class="book-tab active" onclick="switchTab('description',this)">Description</div>
          <div class="book-tab" onclick="switchTab('toc',this)">Table of Contents</div>
          <div class="book-tab" onclick="switchTab('specs',this)">Specifications</div>
          <div class="book-tab" onclick="switchTab('reviews',this)">Reviews (${(book.reviews_list || []).length})</div>
        </div>

        <div class="tab-panel active" id="tab-description">
          <p style="font-size:14px;color:var(--text-muted);line-height:1.85;max-width:760px">${book.description}</p>
        </div>

        <div class="tab-panel" id="tab-toc">
          <ul class="toc-list">${tocHtml}</ul>
        </div>

        <div class="tab-panel" id="tab-specs">
          <table class="spec-table">
            <tr><td>Title</td><td>${book.title}</td></tr>
            <tr><td>Author</td><td>${book.author}</td></tr>
            <tr><td>Publisher</td><td>${book.publisher}</td></tr>
            <tr><td>Edition</td><td>${book.edition}</td></tr>
            <tr><td>University</td><td>${book.university}</td></tr>
            <tr><td>Subject</td><td>${book.subject}</td></tr>
            ${book.pages > 0 ? `<tr><td>Pages</td><td>${book.pages}</td></tr>` : ""}
            <tr><td>Language</td><td>${book.language}</td></tr>
            <tr><td>Format</td><td>Digital (PDF / eBook)</td></tr>
          </table>
        </div>

        <div class="tab-panel" id="tab-reviews">
          <div style="margin-bottom:24px">
            <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
              <span style="font-size:52px;font-weight:900;background:var(--accent-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${book.rating}</span>
              <div>
                <div class="stars" style="font-size:22px">${renderStars(book.rating)}</div>
                <div style="font-size:13px;color:var(--text-muted);margin-top:4px">${book.reviews} total reviews</div>
              </div>
            </div>
          </div>
          ${reviewsHtml}
        </div>

        <!-- RELATED BOOKS -->
        <div style="margin-top:50px">
          <div class="sec-title">You May Also Like</div>
          <div class="sec-bar"></div>
          <div class="related-grid">${relatedHtml}</div>
        </div>
      `;
      }

      function switchTab(name, el) {
        document
          .querySelectorAll(".book-tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-panel")
          .forEach((p) => p.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("tab-" + name).classList.add("active");
      }

      function requireLogin() {
        return true; // or your auth logic
      }
      // ===== INIT =====
      updateCartBadge();
      const params = new URLSearchParams(window.location.search);
      const bookId = params.get("id") || "2208";
      const book = BOOKS[bookId] || BOOKS["2208"];
      renderBook(book);
    </script>
  </body>
