<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – Campus Funda</title>
  <link rel="stylesheet" href="shared.css" />

  <style>
    .checkout-layout {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    .checkout-form {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }

    .checkout-form h3 {
      margin-bottom: 20px;
      font-size: 18px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .checkout-summary {
      width: 320px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      position: sticky;
      top: 100px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .summary-row.total {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 12px;
    }

    .place-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--accent-grad);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2 style="margin-bottom:20px;">Checkout</h2>

    <div class="checkout-layout">

      <!-- FORM -->
      <div class="checkout-form">
        <h3>Delivery Details</h3>

        <div class="form-group">
          <label>Name</label>
          <input type="text" id="name" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" />
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="phone" />
        </div>

        <div class="form-group">
          <label>Address</label>
          <textarea id="address"></textarea>
        </div>
      </div>

      <!-- SUMMARY -->
      <div class="checkout-summary" id="summaryBox"></div>

    </div>
  </div>

  <script>
    function getCart() {
      return JSON.parse(localStorage.getItem("cf_cart") || "[]");
    }

    let promoDiscount = 0;

    function renderSummary() {
      const cart = getCart();

      if (cart.length === 0) {
        document.getElementById("summaryBox").innerHTML =
          "<p>Your cart is empty</p>";
        return;
      }

      const subtotal = cart.reduce((s, i) => s + i.price, 0);

      let discount = 0;

      if (subtotal > 500) {
        discount += Math.round(subtotal * 0.1);
      }

      if (promoDiscount) {
        discount = Math.round(subtotal * promoDiscount);
      }

      const total = subtotal - discount;

      document.getElementById("summaryBox").innerHTML = `
      <h3>Order Summary</h3>

      <div class="summary-row">
        <span>Items (${cart.length})</span>
        <span>₹${subtotal}</span>
      </div>

      <div class="summary-row">
        <span>Discount</span>
        <span style="color:#4caf50">- ₹${discount}</span>
      </div>

      <div class="summary-row total">
        <span>Total</span>
        <span>₹${total}</span>
      </div>

      <button class="place-btn" onclick="placeOrder()">
        Place Order
      </button>
    `;
    }

    function placeOrder() {
      const cart = getCart();

      const order = {
        id: Date.now(),
        items: cart,
        total: cart.reduce((s, i) => s + i.price, 0),
        date: new Date().toLocaleString()
      };

      const orders = JSON.parse(localStorage.getItem("cf_orders") || "[]");
      orders.push(order);

      localStorage.setItem("cf_orders", JSON.stringify(orders));

      localStorage.removeItem("cf_cart");

      alert("Order placed successfully 🎉");
      window.location.href = "index.html";
    }

    renderSummary();
  </script>

</body>

</html>
