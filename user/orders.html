<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders – Campus Funda</title>
    <link rel="stylesheet" href="style.css" />

    <style>
      body {
        background: #0f1115;
        color: #e6e6e6;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
      }

      :root {
        --accent: #0ab4b5;
        --accent-grad: linear-gradient(135deg, #0ab4b5, #7c5cff);
        --border: #232838;
        --bg-card: #151922;
        --text-muted: #9aa4b2;
      }

      .orders {
        max-width: 900px;
        margin: 50px auto;
        padding: 20px;
      }

      h2 {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 24px;
        color: #fff;
      }

      /* ================= ORDER CARD ================= */
      .order-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 14px;
        transition: 0.25s;
      }

      .order-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      }

      .order-header {
        display: flex;
        justify-content: space-between;
        font-weight: 700;
        font-size: 15px;
        margin-bottom: 10px;
        color: #fff;
      }

      .order-items {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 8px;
        line-height: 1.5;
      }

      .order-date {
        font-size: 12px;
        color: var(--text-muted);
      }

      /* ================= EMPTY STATE ================= */
      .empty {
        text-align: center;
        padding: 70px 20px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 14px;
      }

      .empty h3 {
        font-size: 22px;
        margin-bottom: 10px;
        color: #fff;
      }

      .empty p {
        font-size: 14px;
        color: var(--text-muted);
      }

      .empty a {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 22px;
        background: var(--accent-grad);
        color: #fff;
        border-radius: 10px;
        font-weight: 700;
        text-decoration: none;
        transition: 0.2s;
      }

      .empty a:hover {
        opacity: 0.9;
        transform: translateY(-2px);
      }
    </style>
  </head>

  <body>
    <div class="orders">
      <h2 style="margin-bottom: 20px">My Orders</h2>
      <div id="ordersBox"></div>
    </div>

    <script>
      function getOrders() {
        return JSON.parse(localStorage.getItem("cf_orders") || "[]");
      }

      function renderOrders() {
        const orders = getOrders();
        const box = document.getElementById("ordersBox");

        if (orders.length === 0) {
          box.innerHTML = `
        <div class="empty">
          <h3>No orders yet</h3>
          <p>Your purchased items will appear here.</p>
          <a href="../search.html">Start Shopping</a>
        </div>
      `;
          return;
        }

        box.innerHTML = orders
          .map(
            (o) => `
      <div class="order-card">
        <div class="order-header">
          <span>Order #${o.id}</span>
          <span>₹${o.total}</span>
        </div>

        <div class="order-items">
          Items: ${o.items.map((i) => i.title).join(", ")}
        </div>

        <div style="font-size:12px;color:var(--text-muted)">
          Date: ${o.date}
        </div>
      </div>
    `,
          )
          .join("");
      }

      renderOrders();
    </script>
  </body>
</html>
